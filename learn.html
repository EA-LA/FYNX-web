<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FYNX Finance World - Learn</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">

  <style>
    :root{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
      --radius:14px;
    }

    body.dark-mode{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.55);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      min-height:100vh;
    }

    .learn-wrap{
      display:grid;
      gap:0;
      align-content:start;
      max-width:1280px;
      width:100%;
      margin:0 auto;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:color-mix(in oklab, var(--surface) 92%, transparent);
      box-shadow:0 10px 30px rgba(23, 23, 23, 0.08);
      backdrop-filter:blur(10px);
    }

    .learn-frame-shell{
      height:calc(100vh - 110px);
      min-height:500px;
      overflow:hidden;
    }

    .learn-frame{
      width:100%;
      height:100%;
      border:none;
    }

    @media (max-width:900px){
      .learn-wrap{padding:14px}
      .learn-frame-shell{height:calc(100vh - 118px)}
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Learn</h1>
      </div>

      <section class="content-area learn-wrap">
        <div class="panel learn-frame-shell">
          <iframe id="learnFrame"
            class="learn-frame"
            src="learn/topic.html?topic=stocks&section=howto">
          </iframe>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME_KEY = "fynx_theme";
    document.body.classList.toggle(
      "dark-mode",
      localStorage.getItem(THEME_KEY) === "dark"
    );

  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
</body>
</html>
