<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>
    (function(){
      const t = localStorage.getItem("fynx_theme") === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = t;
      document.documentElement.style.backgroundColor = t === "light" ? "#fbfbfb" : "#000000";
    })();
  </script>

  <title>FYNX Finance World - Learn</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">

  <style>
    :root{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
      --radius:14px;
    }

    body.dark-mode{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.55);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      min-height:100vh;
    }

    .learn-wrap{
      display:grid;
      gap:0;
      align-content:start;
      max-width:1280px;
      width:100%;
      margin:0 auto;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:color-mix(in oklab, var(--surface) 92%, transparent);
      box-shadow:0 10px 30px rgba(23, 23, 23, 0.08);
      backdrop-filter:blur(10px);
    }

    .learn-frame-shell{
      height:calc(100vh - 110px);
      min-height:500px;
      overflow:hidden;
    }

    .learn-frame{
      width:100%;
      height:100%;
      border:none;
    }

    @media (max-width:900px){
      .learn-wrap{padding:14px}
      .learn-frame-shell{height:calc(100vh - 118px)}
    }

    .learn-mode-toggle{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px;
      border:1px solid var(--chip-line);
      border-radius:999px;
      background:var(--chip);
      margin-bottom:14px;
    }

    .learn-mode-btn{
      border:1px solid transparent;
      background:transparent;
      color:var(--muted);
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      padding:8px 14px;
      cursor:pointer;
      transition:.18s ease;
      font-family:inherit;
    }

    .learn-mode-btn.active{
      background:color-mix(in oklab, var(--surface) 96%, transparent);
      color:var(--text);
      border-color:var(--line);
    }

    .mode-content{
      display:none;
      opacity:0;
      transition:opacity .18s ease;
    }

    .mode-content.active{
      display:block;
      opacity:1;
    }
  </style>
  <script type="module" src="assets/js/session-bootstrap.js"></script>
</head>

<body>
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Learn</h1>
      </div>

      <section class="content-area learn-wrap">
        <div class="learn-mode-toggle" role="tablist" aria-label="Learn mode toggle">
          <button id="learning-toggle" class="learn-mode-btn active" type="button" role="tab" aria-selected="true">Learning</button>
          <button id="quizzes-toggle" class="learn-mode-btn" type="button" role="tab" aria-selected="false">Quizzes</button>
        </div>

        <div id="learn-content" class="mode-content active">
          <div class="panel learn-frame-shell">
            <iframe id="learnFrame"
              class="learn-frame"
              src="learn/topic.html?topic=stocks&section=howto">
            </iframe>
          </div>
        </div>

        <div id="quiz-content" class="mode-content" aria-hidden="true">
          <div class="panel learn-frame-shell">
            <iframe id="quizFrame"
              class="learn-frame"
              src="trading-quizzes.html">
            </iframe>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME_KEY = "fynx_theme";
    document.body.classList.toggle(
      "dark-mode",
      localStorage.getItem(THEME_KEY) === "dark"
    );

    const learningToggle = document.getElementById("learning-toggle");
    const quizzesToggle = document.getElementById("quizzes-toggle");
    const learnContent = document.getElementById("learn-content");
    const quizContent = document.getElementById("quiz-content");

    function setLearnMode(mode) {
      const isLearning = mode === "learning";
      learningToggle.classList.toggle("active", isLearning);
      quizzesToggle.classList.toggle("active", !isLearning);
      learningToggle.setAttribute("aria-selected", isLearning ? "true" : "false");
      quizzesToggle.setAttribute("aria-selected", isLearning ? "false" : "true");
      learnContent.classList.toggle("active", isLearning);
      quizContent.classList.toggle("active", !isLearning);
      quizContent.setAttribute("aria-hidden", isLearning ? "true" : "false");
      learnContent.setAttribute("aria-hidden", isLearning ? "false" : "true");
    }

    learningToggle.addEventListener("click", () => setLearnMode("learning"));
    quizzesToggle.addEventListener("click", () => setLearnMode("quizzes"));

  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
  <script src="/assets/js/live-site.js" defer></script>
</body>
</html>
