<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FYNX Finance World - Learn</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
      --radius:14px;
    }

    body.dark-mode{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.55);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }

    .learn-header{
      border:1px solid var(--line);
      background:var(--surface-2);
      border-radius:var(--radius);
      padding:16px;
      margin-bottom:14px;
      display:grid;
      gap:12px;
    }
    .learn-header h2{ font-size:18px; font-weight:800; letter-spacing:-.2px; }
    .learn-header p{ color:var(--muted); font-size:13px; }

    .chip-row{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip-pill{
      border:1px solid var(--chip-line);
      background:var(--chip);
      color:var(--text);
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      padding:8px 12px;
      cursor:pointer;
      transition:.18s ease;
    }
    .chip-pill:hover{ transform:translateY(-1px); }
    .chip-pill.active{ background:var(--surface-2); border-color:var(--line); }

    .learn-embed{
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      height:calc(100vh - 240px);
      min-height:520px;
      background:var(--surface);
    }

    .learn-embed iframe{
      width:100%;
      height:100%;
      border:0;
      background:#000;
    }

    @media (max-width: 900px){
      .learn-header{ padding:12px; }
      .learn-embed{ min-height:460px; height:calc(100vh - 270px); }
    }
  </style>

  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">
</head>
<body>
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Learn</h1>
      </div>

      <div class="content-area">
        <section class="learn-header">
          <h2>Learn Markets</h2>
          <p>Full learning center inside the authenticated dashboard with modules, quizzes, and glossary access.</p>

          <div class="chip-row" id="topicRow"></div>
          <div class="chip-row">
            <button class="chip-pill" data-section="howto" type="button">How to Trade</button>
            <button class="chip-pill" data-section="quizzes" type="button">Trading Quizzes</button>
            <button class="chip-pill" data-section="glossary" type="button">Glossary</button>
          </div>
        </section>

        <section class="learn-embed">
          <iframe id="learnFrame" src="learn/topic.html?topic=stocks&section=howto" title="FYNX Learn Center"></iframe>
        </section>
      </div>
    </main>
  </div>

  <script>
    const THEME_KEY = 'fynx_theme';
    document.body.classList.toggle('dark-mode', localStorage.getItem(THEME_KEY) === 'dark');

    const topics = ['stocks','funds','futures','forex','crypto','indices','bonds','economy','options'];
    const labels = {
      stocks:'Stocks', funds:'Funds', futures:'Futures', forex:'Forex', crypto:'Crypto',
      indices:'Indices', bonds:'Bonds', economy:'Economy', options:'Options'
    };

    let state = { topic:'stocks', section:'howto' };
    const topicRow = document.getElementById('topicRow');
    const sectionButtons = Array.from(document.querySelectorAll('[data-section]'));
    const frame = document.getElementById('learnFrame');

    function sync(){
      topicRow.querySelectorAll('[data-topic]').forEach((button) => {
        button.classList.toggle('active', button.getAttribute('data-topic') === state.topic);
      });
      sectionButtons.forEach((button) => {
        button.classList.toggle('active', button.getAttribute('data-section') === state.section);
      });
      frame.src = `learn/topic.html?topic=${encodeURIComponent(state.topic)}&section=${encodeURIComponent(state.section)}`;
    }

    topicRow.innerHTML = topics.map((topic) =>
      `<button class="chip-pill" data-topic="${topic}" type="button">${labels[topic]}</button>`
    ).join('');

    topicRow.querySelectorAll('[data-topic]').forEach((button) => {
      button.addEventListener('click', () => {
        state.topic = button.getAttribute('data-topic');
        sync();
      });
    });

    sectionButtons.forEach((button) => {
      button.addEventListener('click', () => {
        state.section = button.getAttribute('data-section');
        sync();
      });
    });

    sync();
  </script>
  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
</body>
</html>
