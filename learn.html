<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FYNX Finance World - Learn</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">

  <style>
    :root{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
      --radius:14px;
    }

    body.dark-mode{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.55);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      min-height:100vh;
    }

    .learn-wrap{padding:20px;display:grid;gap:14px}

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--surface);
    }

    .learn-header{padding:16px;display:grid;gap:12px}
    .learn-header h2{font-size:18px;font-weight:800}
    .learn-header p{color:var(--muted);font-size:13px}

    .chip-row{display:flex;flex-wrap:wrap;gap:8px}

    .chip{
      border:1px solid var(--chip-line);
      background:var(--chip);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .chip.active{
      background:var(--surface-2);
      border-color:var(--line);
    }

    .learn-frame-shell{
      height:calc(100vh - 220px);
      min-height:500px;
      overflow:hidden;
    }

    .learn-frame{
      width:100%;
      height:100%;
      border:none;
    }

    @media (max-width:900px){
      .learn-wrap{padding:14px}
      .learn-frame-shell{height:calc(100vh - 250px)}
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Learn</h1>
      </div>

      <section class="learn-wrap">
        <div class="panel learn-header">
          <h2>Learn Markets</h2>
          <p>Full FYNX learning center inside your dashboard.</p>

          <div class="chip-row" id="topicRow"></div>

          <div class="chip-row">
            <button class="chip" data-section="howto">How to Trade</button>
            <button class="chip" data-section="quizzes">Trading Quizzes</button>
            <button class="chip" data-section="glossary">Glossary</button>
          </div>
        </div>

        <div class="panel learn-frame-shell">
          <iframe id="learnFrame"
            class="learn-frame"
            src="learn/topic.html?topic=stocks&section=howto">
          </iframe>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME_KEY = "fynx_theme";
    document.body.classList.toggle(
      "dark-mode",
      localStorage.getItem(THEME_KEY) === "dark"
    );

    const topics = ['stocks','funds','futures','forex','crypto','indices','bonds','economy','options'];

    const labels = {
      stocks:'Stocks',
      funds:'Funds',
      futures:'Futures',
      forex:'Forex',
      crypto:'Crypto',
      indices:'Indices',
      bonds:'Bonds',
      economy:'Economy',
      options:'Options'
    };

    let state = { topic:'stocks', section:'howto' };

    const topicRow = document.getElementById('topicRow');
    const sectionButtons = document.querySelectorAll('[data-section]');
    const frame = document.getElementById('learnFrame');

    function buildTopics(){
      topicRow.innerHTML = topics.map(t =>
        `<button class="chip" data-topic="${t}">${labels[t]}</button>`
      ).join('');

      topicRow.querySelectorAll('[data-topic]').forEach(btn => {
        btn.onclick = () => {
          state.topic = btn.dataset.topic;
          sync();
        };
      });
    }

    function sync(){
      document.querySelectorAll('[data-topic]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.topic === state.topic);
      });

      sectionButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === state.section);
      });

      frame.src = `learn/topic.html?topic=${state.topic}&section=${state.section}`;
    }

    sectionButtons.forEach(btn => {
      btn.onclick = () => {
        state.section = btn.dataset.section;
        sync();
      };
    });

    buildTopics();
    sync();
  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
</body>
</html>
