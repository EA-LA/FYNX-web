<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script>
    (function(){
      const t = localStorage.getItem("fynx_theme") === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = t;
      document.documentElement.style.backgroundColor = t === "light" ? "#fbfbfb" : "#000000";
    })();
  </script>

  <title>FYNX Finance World - Calendar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css" />

  <style>
    :root{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
      --radius:14px;
    }

    body.dark-mode{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.55);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      min-height:100vh;
    }

    .calendar-wrap{
      display:grid;
      gap:0;
      align-content:start;
      max-width:1280px;
      width:100%;
      margin:0 auto;
    }

    .calendar-mode-toggle{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px;
      border:1px solid var(--chip-line);
      border-radius:999px;
      background:var(--chip);
      margin-bottom:14px;
      overflow-x:auto;
      max-width:100%;
    }

    .calendar-mode-btn{
      border:1px solid transparent;
      background:transparent;
      color:var(--muted);
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      padding:8px 14px;
      cursor:pointer;
      transition:.18s ease;
      font-family:inherit;
      white-space:nowrap;
    }

    .calendar-mode-btn.active{
      background:color-mix(in oklab, var(--surface) 96%, transparent);
      color:var(--text);
      border-color:var(--line);
    }

    .mode-content{ display:none; }
    .mode-content.active{ display:block; }

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:color-mix(in oklab, var(--surface) 92%, transparent);
      box-shadow:0 10px 30px rgba(23, 23, 23, 0.08);
      backdrop-filter:blur(10px);
    }

    .module-frame{
      width:100%;
      min-height:calc(100vh - 210px);
      border:none;
      border-radius:var(--radius);
      background:var(--surface);
    }

    @media (max-width:900px){
      .module-frame{ min-height:calc(100vh - 270px); }
    }
  </style>
  <script type="module" src="assets/js/session-bootstrap.js"></script>
</head>

<body>
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Calendar</h1>
      </div>

      <section class="content-area calendar-wrap">
        <div class="calendar-mode-toggle" role="tablist" aria-label="Calendar modules">
          <button class="calendar-mode-btn active" type="button" role="tab" aria-selected="true" data-calendar-tab="economic">Economic Calendar</button>
          <button class="calendar-mode-btn" type="button" role="tab" aria-selected="false" data-calendar-tab="holidays">Market Holidays</button>
          <button class="calendar-mode-btn" type="button" role="tab" aria-selected="false" data-calendar-tab="hours">Market Hours</button>
        </div>

        <div class="mode-content active" data-calendar-panel="economic">
          <div class="panel">
            <iframe class="module-frame" title="Economic Calendar" src="tools/economic-calendar.html" loading="lazy"></iframe>
          </div>
        </div>

        <div class="mode-content" data-calendar-panel="holidays" aria-hidden="true">
          <div class="panel">
            <iframe class="module-frame" title="Market Holidays" src="tools/market-holidays.html" loading="lazy"></iframe>
          </div>
        </div>

        <div class="mode-content" data-calendar-panel="hours" aria-hidden="true">
          <div class="panel">
            <iframe class="module-frame" title="Market Hours" src="tools/market-hours.html" loading="lazy"></iframe>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME_KEY = 'fynx_theme';
    document.body.classList.toggle('dark-mode', localStorage.getItem(THEME_KEY) === 'dark');

    const calendarTabs = Array.from(document.querySelectorAll('[data-calendar-tab]'));
    const calendarPanels = Array.from(document.querySelectorAll('[data-calendar-panel]'));

    function setCalendarTab(nextTab) {
      calendarTabs.forEach((tab) => {
        const isActive = tab.dataset.calendarTab === nextTab;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });

      calendarPanels.forEach((panel) => {
        const isActive = panel.dataset.calendarPanel === nextTab;
        panel.classList.toggle('active', isActive);
        panel.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });
    }

    calendarTabs.forEach((tab) => {
      tab.addEventListener('click', () => setCalendarTab(tab.dataset.calendarTab));
    });
  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
  <script src="/assets/js/live-site.js" defer></script>
</body>
</html>
