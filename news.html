<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FYNX Finance World - News</title>
  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css" />
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --panel-soft: rgba(11, 11, 11, 0.04);
      --text:#0b0b0b;
      --muted:#606060;
      --line: rgba(11, 11, 11, 0.10);
      --shadow: 0 18px 38px rgba(0, 0, 0, 0.06);
    }

    body.dark-mode{
      --bg:#000000;
      --panel:#0b0b0b;
      --panel-soft: rgba(243, 243, 243, 0.08);
      --text:#f3f3f3;
      --muted:#afafaf;
      --line: rgba(243, 243, 243, 0.12);
      --shadow: 0 20px 44px rgba(0, 0, 0, 0.55);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:"Segoe UI", -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      color: var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 1px 1px, rgba(0, 0, 0, 0.06) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
    }

    body.dark-mode{
      background:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px) 0 0 / 26px 26px,
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px) 0 0 / 26px 26px,
        radial-gradient(circle at 40% 10%, rgba(255, 255, 255, 0.06) 0%, transparent 45%),
        radial-gradient(circle at 70% 0%, rgba(255, 255, 255, 0.04) 0%, transparent 40%),
        linear-gradient(var(--bg), var(--bg));
    }

    .dashboard-container{ display:flex; min-height:100vh; }

    .nav-panel{
      width: 112px;
      background: color-mix(in oklab, var(--panel) 92%, transparent);
      border-right: 1px solid var(--line);
      position: fixed;
      left:0; top:0; bottom:0;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .main-content{ margin-left:112px; width:calc(100% - 112px); }

    .top-bar{
      position:sticky;
      top:0;
      z-index:9;
      height:72px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 22px;
      background: color-mix(in oklab, var(--panel) 88%, transparent);
      backdrop-filter: blur(10px);
    }

    .page-title{ font-size:18px; font-weight:900; letter-spacing:-0.2px; }

    .content-area{ padding:20px; display:grid; gap:16px; }

    .panel{
      background: color-mix(in oklab, var(--panel) 92%, transparent);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .news-header{ padding:18px; display:grid; gap:14px; }

    .news-header h2{ font-size:20px; font-weight:900; }
    .news-header p{ color:var(--muted); font-size:13px; }

    .news-subnav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .subnav-btn{
      border:1px solid var(--line);
      background:var(--panel-soft);
      color:var(--muted);
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      padding:10px 14px;
      cursor:pointer;
      transition: all .18s ease;
    }

    .subnav-btn:hover{ color:var(--text); transform:translateY(-1px); }
    .subnav-btn.active{
      color:var(--text);
      border-color: color-mix(in oklab, var(--text) 18%, var(--line));
      background: color-mix(in oklab, var(--panel-soft) 55%, transparent);
    }

    .module-shell{ padding:8px; }

    .module-frame{
      width:100%;
      min-height:74vh;
      border:0;
      border-radius:12px;
      background:var(--panel);
    }

    @media (max-width: 900px){
      .nav-panel{ width:100%; height:74px; top:auto; border-right:0; border-top:1px solid var(--line); }
      .main-content{ margin-left:0; width:100%; padding-bottom: calc(88px + env(safe-area-inset-bottom)); }
      .content-area{ padding:12px; }
      .top-bar{ padding:0 12px; }
      .module-frame{ min-height:68vh; }
    }
  </style>
</head>

<body data-view="news">
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">News</h1>
      </div>

      <div class="content-area">
        <section class="panel news-header">
          <div>
            <h2>Market Intelligence</h2>
            <p>Use the same live tools available on the public News pages, now surfaced directly in your dashboard workflow.</p>
          </div>
          <div class="news-subnav" role="tablist" aria-label="News tools">
            <button class="subnav-btn active" data-module="news" type="button">News</button>
            <button class="subnav-btn" data-module="heatmap" type="button">Heat Map</button>
            <button class="subnav-btn" data-module="sentiment" type="button">Sentiment</button>
            <button class="subnav-btn" data-module="challenges" type="button">Challenges</button>
          </div>
        </section>

        <section class="panel module-shell">
          <iframe
            id="newsModuleFrame"
            class="module-frame"
            title="News Module"
            src="news/news.html"
            loading="lazy"
            referrerpolicy="no-referrer"
          ></iframe>
        </section>
      </div>
    </main>
  </div>

  <script>
    const THEME_KEY = 'fynx_theme';
    const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
    document.body.classList.toggle('dark-mode', savedTheme === 'dark');

    const modules = {
      news: 'news/news.html',
      heatmap: 'news/heatmap.html',
      sentiment: 'news/sentiment.html',
      challenges: 'news/challenges.html'
    };

    const frame = document.getElementById('newsModuleFrame');
    const buttons = Array.from(document.querySelectorAll('.subnav-btn'));

    function setActiveModule(moduleKey) {
      const nextSrc = modules[moduleKey] || modules.news;
      if (frame.getAttribute('src') !== nextSrc) {
        frame.setAttribute('src', nextSrc);
      }

      buttons.forEach((btn) => {
        const isActive = btn.dataset.module === moduleKey;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', String(isActive));
      });

      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.set('tool', moduleKey);
      window.history.replaceState({}, '', nextUrl.toString());
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => setActiveModule(btn.dataset.module));
    });

    const urlModule = new URLSearchParams(window.location.search).get('tool');
    setActiveModule(urlModule && modules[urlModule] ? urlModule : 'news');
  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
</body>
</html>
