<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FYNX Finance World - News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app-shell.css" />
  <link rel="stylesheet" href="assets/css/mobile-fixes.css" />
  <script>
    (function(){
      const t = localStorage.getItem('fynx_theme') === 'light' ? 'light' : 'dark';
      document.documentElement.dataset.theme = t;
      document.documentElement.style.backgroundColor = t === 'light' ? '#fbfbfb' : '#000';
      if (t === 'dark') document.documentElement.classList.add('dark-mode');
    })();
  </script>

  <style>
    :root{
      --bg:#000000;
      --surface:#000000;
      --surface-2:rgba(255, 255, 255, 0.04);
      --text:#ffffff;
      --muted:rgba(255, 255, 255, 0.62);
      --line:rgba(255, 255, 255, 0.10);
      --chip:rgba(255, 255, 255, 0.06);
      --chip-line:rgba(255, 255, 255, 0.10);
      --hero-dot: rgba(255, 255, 255, 0.08);
      --radius:14px;
    }

    body.light-mode{
      --bg:#ffffff;
      --surface:#ffffff;
      --surface-2:#f7f7f7;
      --text:#0f0f0f;
      --muted:#727272;
      --line:#e7e7e7;
      --chip:#f4f4f4;
      --chip-line:#e7e7e7;
      --hero-dot: rgba(0, 0, 0, 0.06);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at 1px 1px, var(--hero-dot) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--bg), var(--bg));
      color:var(--text);
      min-height:100vh;
    }

    .news-wrap{
      display:grid;
      gap:0;
      align-content:start;
      max-width:1280px;
      width:100%;
      margin:0 auto;
    }

    .news-mode-toggle{
      display:flex;
      align-items:center;
      gap:6px;
      padding:4px;
      border:1px solid var(--chip-line);
      border-radius:999px;
      background:var(--chip);
      margin-bottom:14px;
      overflow-x:auto;
      width:fit-content;
      max-width:100%;
    }

    .news-mode-btn{
      border:1px solid transparent;
      background:transparent;
      color:var(--muted);
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      padding:8px 14px;
      cursor:pointer;
      transition:.18s ease;
      font-family:inherit;
      white-space:nowrap;
    }

    .news-mode-btn.active{
      background:color-mix(in oklab, var(--surface) 96%, transparent);
      color:var(--text);
      border-color:var(--line);
    }

    .mode-content{ display:none; }
    .mode-content.active{ display:block; }

    .module-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
      align-items:start;
    }

    .module-grid.triple{ grid-template-columns:repeat(3, minmax(0, 1fr)); }

    .module-grid.single{ grid-template-columns:minmax(0, 1fr); }

    .module-card{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:color-mix(in oklab, var(--surface) 92%, transparent);
      box-shadow:0 10px 30px rgba(23, 23, 23, 0.08);
      backdrop-filter:blur(10px);
      padding:12px;
      display:grid;
      gap:12px;
    }

    .module-title{
      font-size:13px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:0.2px;
      padding:2px 2px 0;
    }

    .module-frame{
      width:100%;
      border:none;
      border-radius:12px;
      background:var(--surface);
      min-height:500px;
    }

    .module-frame.news-feed{
      min-height:calc(100vh - 220px);
    }

    .mode-content[data-news-panel="macro"] .module-frame,
    .mode-content[data-news-panel="positioning"] .module-frame{
      min-height:560px;
    }

    .mode-content[data-news-panel="markets"] .module-frame,
    .mode-content[data-news-panel="analysis"] .module-frame{
      min-height:460px;
    }

    .mode-content[data-news-panel="analysis"] .module-grid,
    .mode-content[data-news-panel="markets"] .module-grid{
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    @media (max-width:1080px){
      .module-grid,
      .mode-content[data-news-panel="analysis"] .module-grid,
      .mode-content[data-news-panel="markets"] .module-grid{ grid-template-columns:minmax(0, 1fr); }
      .module-frame.news-feed{ min-height:calc(100vh - 260px); }
      .module-frame{ min-height:520px; }
    }
  </style>
  <script type="module" src="assets/js/session-bootstrap.js"></script>
</head>

<body data-view="news">
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">News</h1>
      </div>

      <section class="content-area news-wrap">
        <div class="news-mode-toggle" role="tablist" aria-label="News modules">
          <button class="news-mode-btn active" type="button" role="tab" aria-selected="true" data-news-tab="feed">News Feed</button>
          <button class="news-mode-btn" type="button" role="tab" aria-selected="false" data-news-tab="macro">Macro</button>
          <button class="news-mode-btn" type="button" role="tab" aria-selected="false" data-news-tab="markets">Markets</button>
          <button class="news-mode-btn" type="button" role="tab" aria-selected="false" data-news-tab="analysis">Analysis</button>
          <button class="news-mode-btn" type="button" role="tab" aria-selected="false" data-news-tab="positioning">Positioning</button>
        </div>

        <div class="mode-content active" data-news-panel="feed">
          <div class="module-grid single">
            <article class="module-card">
              <iframe class="module-frame news-feed" title="News Feed" src="news/news.html" loading="lazy"></iframe>
            </article>
          </div>
        </div>

        <div class="mode-content" data-news-panel="macro" aria-hidden="true">
          <div class="module-grid">
            <article class="module-card">
              <h2 class="module-title">Interest Rates</h2>
              <iframe class="module-frame" title="Interest Rates" src="tools/interest-rates.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Economic Indicators Heatmap</h2>
              <iframe class="module-frame" title="Economic Indicators Heatmap" src="tools/heatmap.html" loading="lazy"></iframe>
            </article>
          </div>
        </div>

        <div class="mode-content" data-news-panel="markets" aria-hidden="true">
          <div class="module-grid">
            <article class="module-card">
              <h2 class="module-title">Markets</h2>
              <iframe class="module-frame" title="Markets" src="markets/index.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Currencies</h2>
              <iframe class="module-frame" title="Currencies" src="markets/currencies.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Crypto</h2>
              <iframe class="module-frame" title="Crypto" src="markets/crypto.html" loading="lazy"></iframe>
            </article>
          </div>
        </div>

        <div class="mode-content" data-news-panel="analysis" aria-hidden="true">
          <div class="module-grid">
            <article class="module-card">
              <h2 class="module-title">Indicators</h2>
              <iframe class="module-frame" title="Indicators" src="markets/indicators.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Patterns</h2>
              <iframe class="module-frame" title="Patterns" src="markets/patterns.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Volatility</h2>
              <iframe class="module-frame" title="Volatility" src="markets/volatility.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Correlation</h2>
              <iframe class="module-frame" title="Correlation" src="markets/correlation.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Liquidity</h2>
              <iframe class="module-frame" title="Liquidity" src="markets/liquidity.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Historical Data</h2>
              <iframe class="module-frame" title="Historical Data" src="markets/historical-data.html" loading="lazy"></iframe>
            </article>
          </div>
        </div>

        <div class="mode-content" data-news-panel="positioning" aria-hidden="true">
          <div class="module-grid">
            <article class="module-card">
              <h2 class="module-title">Commitments of Traders</h2>
              <iframe class="module-frame" title="Commitments of Traders" src="markets/cot.html" loading="lazy"></iframe>
            </article>
            <article class="module-card">
              <h2 class="module-title">Recent Topics Discussed</h2>
              <iframe class="module-frame" title="Recent Topics Discussed" src="tools/recent-topics-discussed.html" loading="lazy"></iframe>
            </article>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const THEME_KEY = 'fynx_theme';
    const isLightTheme = localStorage.getItem(THEME_KEY) === 'light';
    document.body.classList.toggle('light-mode', isLightTheme);
    document.body.classList.toggle('dark-mode', !isLightTheme);

    const newsTabs = Array.from(document.querySelectorAll('[data-news-tab]'));
    const newsPanels = Array.from(document.querySelectorAll('[data-news-panel]'));

    function setNewsTab(nextTab) {
      newsTabs.forEach((tab) => {
        const isActive = tab.dataset.newsTab === nextTab;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });

      newsPanels.forEach((panel) => {
        const isActive = panel.dataset.newsPanel === nextTab;
        panel.classList.toggle('active', isActive);
        panel.setAttribute('aria-hidden', isActive ? 'false' : 'true');
      });
    }

    newsTabs.forEach((tab) => {
      tab.addEventListener('click', () => setNewsTab(tab.dataset.newsTab));
    });
  </script>

  <script src="fynx-nav.js"></script>
  <script src="fynx-usercard.js"></script>
  <script src="/assets/js/live-site.js" defer></script>
</body>
</html>
