<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FYNX - Account Settings</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#fff;color:#000;overflow:hidden;height:100vh}
    body.dark-mode{background:#000;color:#fff}
    .dashboard-container{display:flex;height:100vh;width:100vw}
    .nav-panel{width:120px;background:#fafafa;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;position:fixed;left:0;top:0;height:100vh;z-index:100}
    body.dark-mode .nav-panel{background:#000;border-right:1px solid rgba(255, 255, 255, .08)}
    .main-content{margin-left:120px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
    .top-bar{height:64px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:#fff}
    body.dark-mode .top-bar{border-bottom:1px solid rgba(255, 255, 255, .08);background:#000}
    .page-title{font-size:15px;font-weight:600;color:#666}
    body.dark-mode .page-title{color:rgba(255, 255, 255, .5)}
    .top-bar-right{display:flex;align-items:center;gap:12px}
    .icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid #e5e5e5;background:#fff;display:grid;place-items:center;cursor:pointer}
    .icon-btn svg{width:18px;height:18px;stroke:#000;stroke-width:1.5;fill:none}
    body.dark-mode .icon-btn{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
    body.dark-mode .icon-btn svg{stroke:#fff}
    .content-area{flex:1;overflow-y:auto;padding:36px;background:#fff;display:grid;gap:14px}
    body.dark-mode .content-area{background:#000}
    .section-header h2{font-size:28px;font-weight:700;letter-spacing:-.5px;color:#000}
    body.dark-mode .section-header h2{color:#fff}
    .section-header p{font-size:13px;color:#888;margin-top:5px}
    .card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:18px}
    body.dark-mode .card{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08)}
    .card h3{font-size:14px;font-weight:800;margin-bottom:14px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .field{display:grid;gap:6px}
    .field label{font-size:12px;font-weight:700;color:#777}
    .field input,.field select,.field textarea{height:40px;border:1px solid #ddd;border-radius:10px;padding:0 12px;background:#fff;font-size:13px}
    .field textarea{height:86px;padding:10px 12px;resize:vertical}
    body.dark-mode .field input,body.dark-mode .field select,body.dark-mode .field textarea{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#fff}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap}
    .market-pill{padding:7px 10px;border:1px solid #ddd;border-radius:999px;font-size:12px;cursor:pointer;font-weight:700}
    .market-pill.on{background:#000;color:#fff;border-color:#000}
    body.dark-mode .market-pill{border-color:rgba(255,255,255,.2);color:#fff}
    body.dark-mode .market-pill.on{background:#fff;color:#000;border-color:#fff}
    .actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{height:40px;padding:0 14px;border-radius:10px;border:1px solid #e5e5e5;background:#fff;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;color:inherit;display:inline-flex;align-items:center}
    .btn.primary{background:#000;color:#fff;border-color:#000}
    .status{font-size:12px;color:#777}
    .avatar{width:56px;height:56px;border-radius:999px;object-fit:cover;border:1px solid #ddd;background:#fff}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.content-area{padding:20px}}
  </style>
  <link rel="stylesheet" href="assets/css/mobile-fixes.css">
</head>
<body data-protected-page="true">
  <div class="dashboard-container">
    <nav class="nav-panel"></nav>
    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Account Settings</h1>
        <div class="top-bar-right">
          <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg></button>
          <button class="icon-btn" title="Notifications" aria-label="Notifications"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
        </div>
      </div>

      <div class="content-area">
        <div class="section-header"><h2>Account Settings</h2><p>Identity, support, legal, and trading profile controls.</p></div>

        <form class="card" id="accountForm">
          <h3>Identity</h3>
          <div class="grid">
            <div class="field"><label>Display name</label><input id="displayName" required></div>
            <div class="field"><label>Username / handle</label><input id="username" placeholder="fynxtrader"></div>
            <div class="field" style="grid-column:1/-1"><label>Short bio</label><textarea id="bio" maxlength="280"></textarea></div>
            <div class="field"><label>Country / region</label><input id="country"></div>
            <div class="field"><label>Timezone</label><input id="timezone"></div>
            <div class="field"><label>Preferred currency</label><select id="preferredCurrency"><option>USD</option><option>EUR</option><option>GBP</option><option>JPY</option><option>AUD</option></select></div>
            <div class="field"><label>Profile photo upload</label><input type="file" id="profilePhoto" accept="image/*"></div>
          </div>
          <div style="margin:10px 0;display:flex;align-items:center;gap:10px"><img id="profilePreview" class="avatar" alt="Profile preview"><span class="status" id="photoStatus">No upload in progress.</span></div>

          <h3 style="margin-top:6px">Trading Profile</h3>
          <div class="grid">
            <div class="field"><label>Experience level</label><select id="experienceLevel"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option><option value="pro">Professional</option></select></div>
            <div class="field"><label>Risk profile</label><select id="riskProfile"><option value="conservative">Conservative</option><option value="moderate">Moderate</option><option value="aggressive">Aggressive</option></select></div>
            <div class="field" style="grid-column:1/-1"><label>Preferred markets</label><div class="pill-row" id="marketPills"></div></div>
          </div>

          <h3 style="margin-top:8px">Support & Legal</h3>
          <div class="actions">
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a class="btn" href="https://apps.apple.com/us/app/fynx-finance-world/id6752357210" target="_blank" rel="noopener">Download App</a>
              <a class="btn" href="mailto:support@fynxfinanceworld.com">Contact Support</a>
              <a class="btn" href="https://fynxfinanceworld.com/terms" target="_blank" rel="noopener">Terms</a>
              <a class="btn" href="https://fynxfinanceworld.com/privacy" target="_blank" rel="noopener">Privacy</a>
              <a class="btn" href="https://fynxfinanceworld.com/risk-disclosure" target="_blank" rel="noopener">Risk Disclosure</a>
            </div>
            <div style="display:flex;gap:8px;align-items:center"><span id="saveStatus" class="status">Ready</span><button class="btn primary" type="submit">Save changes</button></div>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script type="module" src="assets/js/session-bootstrap.js"></script>
<script>
  (function(){
    const nav=document.querySelector('.nav-panel');
    if(!nav) return;
    const items=[['home','home.html','<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>'],['journal','journal.html','<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>'],['calculator','calculator.html','<rect x="4" y="2" width="16" height="20" rx="2"></rect>'],['news','news.html','<path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>'],['calendar','calendar.html','<rect x="3" y="4" width="18" height="18" rx="2"></rect>'],['profile','profile.html','<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>']];
    nav.innerHTML=`<div style="padding:32px 0;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:800">FYNX</div><div style="padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px">${items.map(([k,href,svg])=>`<a href="${href}" style="width:80px;padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;color:#666;border-radius:8px"><svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5">${svg}</svg><span style="font-size:11px;font-weight:600">${k[0].toUpperCase()+k.slice(1)}</span></a>`).join('')}</div>`;
  })();
</script>
    <script type="module">
    import { auth, bootstrapAccount, saveUserProfile, uploadProfilePhoto, updateAuthProfile } from './assets/js/account-system.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { mountNotificationBell } from './assets/js/account-ui.js';
    const markets = ['forex','crypto','stocks','indices','commodities','futures'];
    const marketPills = document.getElementById('marketPills');
    const selectedMarkets = new Set();
    const form = document.getElementById('accountForm');
    const saveStatus = document.getElementById('saveStatus');
    const photoStatus = document.getElementById('photoStatus');
    const profilePreview = document.getElementById('profilePreview');

    function applyTheme(){ const t=localStorage.getItem('fynx_theme'); document.body.classList.toggle('dark-mode', t==='dark'); }
    document.getElementById('themeBtn').addEventListener('click',()=>{const d=!document.body.classList.contains('dark-mode');document.body.classList.toggle('dark-mode',d);localStorage.setItem('fynx_theme',d?'dark':'light');});
    applyTheme();

    markets.forEach((m)=>{const b=document.createElement('button');b.type='button';b.className='market-pill';b.dataset.market=m;b.textContent=m.toUpperCase();b.onclick=()=>{b.classList.toggle('on');b.classList.contains('on')?selectedMarkets.add(m):selectedMarkets.delete(m)};marketPills.appendChild(b);});

    function setForm(profile){
      ['displayName','username','bio','country','timezone','preferredCurrency','experienceLevel','riskProfile'].forEach((id)=>{if(profile[id]!=null)document.getElementById(id).value=profile[id];});
      profilePreview.src = profile.photoURL || 'https://dummyimage.com/112x112/eeeeee/666666&text=FX';
      selectedMarkets.clear();
      (profile.preferredMarkets || []).forEach((m)=>selectedMarkets.add(m));
      document.querySelectorAll('.market-pill').forEach((pill)=>pill.classList.toggle('on', selectedMarkets.has(pill.dataset.market)));
    }

    onAuthStateChanged(auth, async (user)=>{
      if(!user) return;
      const seeded = await bootstrapAccount(user);
      setForm({ ...seeded.profile, displayName: seeded.profile.displayName || user.displayName || '' });
    });

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const user = auth.currentUser;
      if(!user) return;
      saveStatus.textContent = 'Saving...';
      let photoURL = profilePreview.src;
      const file = document.getElementById('profilePhoto').files?.[0];
      if(file){
        try { photoStatus.textContent = 'Uploading photo...'; photoURL = await uploadProfilePhoto(user.uid, file); photoStatus.textContent = 'Photo uploaded.'; }
        catch(err){ photoStatus.textContent = 'Upload failed. Check Firebase Storage rules.'; }
      }
      const payload = {
        displayName: document.getElementById('displayName').value.trim(),
        username: document.getElementById('username').value.trim(),
        bio: document.getElementById('bio').value.trim(),
        country: document.getElementById('country').value.trim(),
        timezone: document.getElementById('timezone').value.trim(),
        preferredCurrency: document.getElementById('preferredCurrency').value,
        experienceLevel: document.getElementById('experienceLevel').value,
        riskProfile: document.getElementById('riskProfile').value,
        preferredMarkets: Array.from(selectedMarkets),
        photoURL
      };
      await saveUserProfile(user.uid, payload);
      await updateAuthProfile({ displayName: payload.displayName, photoURL: payload.photoURL || null });
      localStorage.setItem('fynxUserName', payload.displayName || 'FYNX User');
      saveStatus.textContent = 'Saved';
    });

    mountNotificationBell();
  </script>
  <script src="/assets/js/live-site.js" defer></script>
</body>
</html>
