<html lang="en">
<head>

  <style>
    :root{
      --bg:#080808;
      --bg-soft:#101010;
      --text:#ffffff;
      --text-muted:rgba(255, 255, 255, .72);
      --text-soft:rgba(255, 255, 255, .56);
      --panel:#161616;
      --panel-soft:rgba(255, 255, 255, .04);
      --border:rgba(255, 255, 255, .13);
      --chip:rgba(255, 255, 255, .05);
      --chip-hover:rgba(255, 255, 255, .1);
      --accent:#a5a5a5;
      --accent-soft:rgba(165, 165, 165, .2);
      --ok:#909090;
      --warn:#cdcdcd;
      --danger:#9e9e9e;
    }

    html[data-theme="light"], body.light-mode {
      --bg:#f7f7f7;
      --bg-soft:#f1f1f1;
      --text:#1a1a1a;
      --text-muted:rgba(26, 26, 26, .76);
      --text-soft:rgba(26, 26, 26, .6);
      --panel:#ffffff;
      --panel-soft:#f3f3f3;
      --border:rgba(26, 26, 26, .12);
      --chip:#ffffff;
      --chip-hover:#f0f0f0;
      --accent:#5c5c5c;
      --accent-soft:rgba(92, 92, 92, .16);
      --ok:#686868;
      --warn:#7f7f7f;
      --danger:#616161;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter','Segoe UI',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}

    .animated-bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
    .grid-overlay{
      position:absolute;inset:0;
      background-image:
        linear-gradient(color-mix(in oklab, var(--text) 8%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in oklab, var(--text) 8%, transparent) 1px, transparent 1px);
      background-size:44px 44px;
      opacity:.36;
      animation:gridMove 22s linear infinite;
    }
    @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(44px,44px)}}

    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.2;animation:float 18s ease-in-out infinite}
    .orb-1{width:540px;height:540px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);left:-220px;top:-260px}
    .orb-2{width:420px;height:420px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);right:-180px;bottom:-160px;animation-delay:5s}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-40px)}}

    header{position:sticky;top:0;z-index:10;background:color-mix(in oklab, var(--bg) 88%, transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav{max-width:1280px;margin:0 auto;padding:.9rem 1.2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
    .brand{display:flex;align-items:center;gap:.55rem;font-size:1.24rem;font-weight:900;letter-spacing:-.9px}
    .btn, .chip{
      display:inline-flex;align-items:center;gap:.46rem;
      color:var(--text);text-decoration:none;font-weight:700;
      border:1px solid var(--border);background:var(--chip);border-radius:999px;padding:.55rem .85rem;
      transition:.24s ease;
    }
    .btn:hover,.chip:hover{background:var(--chip-hover);transform:translateY(-1px)}
    .chip.active{background:var(--accent-soft);border-color:color-mix(in oklab, var(--accent) 55%, var(--border));}

    main{max-width:1280px;margin:0 auto;padding:1.5rem 1.2rem 3rem}
    .hero{padding:1.4rem;border:1px solid var(--border);background:var(--panel-soft);border-radius:20px}
    h1{font-size:clamp(1.9rem,5.2vw,3rem);line-height:1.1;letter-spacing:-1.5px}
    .sub{margin-top:.55rem;max-width:80ch;color:var(--text-muted);line-height:1.65}

    .chips{display:flex;flex-wrap:wrap;gap:.55rem;margin-top:1rem}

    .kpis{margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.7rem}
    .kpi{border:1px solid var(--border);background:var(--panel);border-radius:14px;padding:.8rem}
    .kpi .label{color:var(--text-soft);font-size:.82rem}
    .kpi .value{margin-top:.22rem;font-size:1.05rem;font-weight:800}

    .panel{margin-top:1rem;border:1px solid var(--border);background:var(--panel);border-radius:16px;padding:1rem}
    .panel h2{font-size:1.1rem;letter-spacing:-.2px}
    .panel p{color:var(--text-muted);line-height:1.65;margin-top:.5rem}
    .panel h3{margin:.85rem 0 .45rem;font-size:1rem}
    ul{display:grid;gap:.45rem;padding-left:1.1rem;color:var(--text-muted)}
    li strong{color:var(--text)}

    .grid{margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.8rem}
    .card{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:1rem}
    .card h3{font-size:1.04rem;letter-spacing:-.2px}
    .card .muted{margin-top:.4rem;color:var(--text-muted);line-height:1.6}
    .meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.75rem}
    .tag{padding:.26rem .55rem;border-radius:999px;border:1px solid var(--border);background:var(--chip);font-size:.72rem;font-weight:700;color:var(--text-soft)}

    .lesson-cards{margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.8rem}
    .lesson-card{border:1px solid var(--border);border-radius:14px;background:var(--panel);overflow:hidden}
    .lesson-head{height:78px;display:flex;align-items:flex-end;padding:.85rem;background:linear-gradient(120deg,var(--accent-soft),transparent)}
    .difficulty{display:inline-flex;align-items:center;gap:.35rem;padding:.24rem .56rem;border-radius:999px;border:1px solid var(--border);background:var(--chip);font-size:.72rem;font-weight:700}
    .lesson-body{padding:.95rem}
    .lesson-title{font-size:1.12rem;line-height:1.28;letter-spacing:-.25px}
    .lesson-desc{margin-top:.5rem;color:var(--text-muted);line-height:1.6}

    .quiz-wrap{margin-top:1rem;display:grid;gap:.8rem}
    .quiz-card{border:1px solid var(--border);border-radius:14px;background:var(--panel);padding:1rem}
    .quiz-card h3{font-size:1rem;line-height:1.45}
    .options{margin-top:.7rem;display:grid;gap:.52rem}
    .opt{display:flex;gap:.55rem;align-items:flex-start;border:1px solid var(--border);background:var(--panel-soft);border-radius:10px;padding:.56rem .62rem}
    .opt-letter{display:inline-flex;align-items:center;justify-content:center;width:1.3rem;height:1.3rem;border-radius:50%;background:var(--chip);font-size:.72rem;font-weight:800}
    .answer{margin-top:.68rem;border-left:3px solid var(--ok);padding:.38rem .6rem;background:color-mix(in oklab, var(--ok) 13%, transparent);border-radius:8px;color:var(--text-muted);line-height:1.55}

    .rubric{margin-top:1rem;border:1px dashed var(--border);background:var(--panel-soft);border-radius:12px;padding:.9rem}
    .rubric h3{font-size:.95rem}
    .rubric-grid{margin-top:.6rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.55rem}
    .rubric-item{border:1px solid var(--border);border-radius:10px;padding:.62rem;background:var(--panel)}

    .glossary{margin-top:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:.7rem}
    .term{border:1px solid var(--border);border-radius:12px;background:var(--panel);padding:.8rem}
    .term strong{display:block;margin-bottom:.3rem}
    .term p{color:var(--text-muted);line-height:1.58}

    @media (max-width:640px){
      .nav{padding:.72rem .8rem}
      main{padding:1rem .82rem 2rem}
      .hero{padding:1rem}
    }
  </style>

</head>

      ],
      economy: [
        { q:'Why markets react to data surprises?', options:['Exact level never matters','Difference vs consensus shifts expectations','Only yesterday values matter','No one tracks forecasts'], answer:'Difference vs consensus shifts expectations', explain:'Pricing already embeds baseline expectations.' },
        { q:'Scenario planning before CPI helps by:', options:['Removing all risk','Defining responses before volatility','Predicting exact candle','Avoiding all trades forever'], answer:'Defining responses before volatility', explain:'Prepared decisions improve discipline in fast conditions.' },
        { q:'A hawkish policy signal usually implies:', options:['Easier policy','Tighter financial conditions','No currency impact','Guaranteed stock rally'], answer:'Tighter financial conditions', explain:'Hawkish stance often lifts yields and pressures risk assets.' },
        { q:'PMI is primarily a measure of:', options:['Housing prices only','Business activity momentum','Tax rates','Broker regulation'], answer:'Business activity momentum', explain:'PMI surveys indicate expansion/contraction trends.' },
        { q:'Best macro workflow includes:', options:['Random headlines only','Calendar + consensus + scenario + execution rules','No review','Trade every print'], answer:'Calendar + consensus + scenario + execution rules', explain:'Structured process turns macro data into repeatable trading behavior.' }
      ],
      options: [
        { q:'Delta estimates:', options:['Time decay','Price sensitivity to underlying move','Volatility rank','Commission'], answer:'Price sensitivity to underlying move', explain:'Delta approximates change in option premium per $1 underlying move.' },
        { q:'Theta represents:', options:['Vega exposure','Time decay effect','Skew premium only','Strike width'], answer:'Time decay effect', explain:'Theta measures value lost from time passing.' },
        { q:'High implied volatility often favors:', options:['Buying expensive premium blindly','Premium-selling structures (with risk controls)','Ignoring spreads','No strategy'], answer:'Premium-selling structures (with risk controls)', explain:'Higher IV can make sold premium relatively rich.' },
        { q:'Defined-risk spread advantage is:', options:['Unlimited loss','Known max risk at entry','No margin ever','No Greeks exposure'], answer:'Known max risk at entry', explain:'Risk is capped by structure width and net debit/credit.' },
        { q:'Before earnings, option traders should evaluate:', options:['Only stock logo','Expected move vs strategy payoff','Ignore IV crush','No exit plan'], answer:'Expected move vs strategy payoff', explain:'Event volatility and post-event IV changes heavily impact outcomes.' }
      ]
    };

    const glossaryBank = {
      stocks:[['Float','Shares available for public trading, excluding locked insider holdings.'],['VWAP','Volume-weighted average price benchmark used for execution quality.'],['ATR','Average True Range, measuring recent volatility.'],['Relative Strength','Performance of a stock versus index/sector.'],['Gap','Price jump between sessions with little to no trading in between.'],['Catalyst','Event likely to trigger a repricing (earnings, guidance, news).'],['Drawdown','Peak-to-trough decline in strategy equity.'],['R-Multiple','Profit/loss expressed as units of initial risk.']],
      funds:[['NAV','Net asset value per share of fund holdings.'],['Tracking Error','Deviation of fund returns from benchmark returns.'],['Expense Ratio','Annual management fee as percentage of assets.'],['AUM','Assets under management.'],['Creation/Redemption','Mechanism market makers use to align ETF price and NAV.'],['Smart Beta','Rule-based factor investing approach.'],['Rebalance','Periodic portfolio reset to target weights.'],['Overlap Risk','Hidden concentration from similar holdings across funds.']],
      futures:[['Tick','Minimum price increment for contract movement.'],['Tick Value','Dollar value of one tick movement.'],['Initial Margin','Capital required to open a futures position.'],['Maintenance Margin','Minimum equity needed to keep position open.'],['Rollover','Switching exposure to next active contract month.'],['Contango','Futures curve shape where distant contracts trade higher than spot.'],['Backwardation','Futures curve shape where distant contracts trade lower than spot.'],['Open Interest','Number of outstanding contracts not yet closed.']],
      forex:[['Pip','Standardized smallest FX price movement unit for most pairs.'],['Lot','Standardized trade size in currency markets.'],['Spread','Difference between bid and ask prices.'],['Swap','Overnight financing credit/debit for held position.'],['Base Currency','First currency in pair notation.'],['Quote Currency','Second currency in pair notation.'],['Correlation','Relationship between two assets moving together or opposite.'],['DXY','US Dollar Index used as broad USD benchmark.']],
      crypto:[['Perpetual Futures','Futures contract with no expiration; uses funding rate.'],['Funding Rate','Payment between long/short sides to anchor perp price to spot.'],['On-Chain','Blockchain transaction/wallet behavior data.'],['Dominance','Share of total crypto market cap held by a specific coin.'],['Liquidation','Forced position closure due to insufficient margin.'],['Order Book Imbalance','Difference in visible bid/ask depth.'],['Stablecoin Flow','Movement of stablecoins often linked to risk appetite.'],['Slippage','Difference between expected and actual execution price.']],
      indices:[['Breadth','How broadly stocks participate in index move.'],['A/D Line','Advance-decline indicator for market participation.'],['Opening Range','Initial session high/low reference zone.'],['VIX','Implied volatility index derived from S&P 500 options.'],['Trend Day','Session with sustained directional bias.'],['Rotation','Capital flow between sectors/factors.'],['Risk-On/Risk-Off','Market appetite for higher vs lower risk assets.'],['Internals','Live indicators like volume breadth and tick.']],
      bonds:[['Yield','Return earned from holding a bond to maturity.'],['Duration','Sensitivity of bond price to interest-rate change.'],['Yield Curve','Plot of yields across maturities.'],['Spread','Yield difference between two debt instruments.'],['Coupon','Periodic interest payment from bond issuer.'],['Real Yield','Nominal yield adjusted for inflation expectations.'],['Term Premium','Extra yield demanded for longer maturity exposure.'],['Auction','Government debt issuance process affecting rates.']],
      economy:[['CPI','Consumer Price Index, key inflation measure.'],['PCE','Personal Consumption Expenditures inflation metric.'],['NFP','US Non-Farm Payrolls employment report.'],['PMI','Purchasing Managers Index for business activity.'],['GDP','Gross Domestic Product, overall economic output.'],['Consensus','Market expectation before data release.'],['Revision Risk','Past data adjustments that alter macro interpretation.'],['Policy Guidance','Forward-looking central bank communication.']],
      options:[['Delta','Sensitivity of option value to underlying price changes.'],['Gamma','Rate of change of delta.'],['Theta','Time decay component of option value.'],['Vega','Sensitivity to implied volatility changes.'],['IV Rank','Current implied volatility versus historical range.'],['Credit Spread','Premium-selling structure with capped risk.'],['Debit Spread','Premium-buying structure with capped risk.'],['Assignment Risk','Early exercise risk for short option positions.']]
    };

    function linkFor(nextTopic, sec){
      return 'topic.html?topic=' + encodeURIComponent(nextTopic) + '&section=' + encodeURIComponent(sec);
    }

    function renderTopicChips(){
      const container = document.getElementById('topicChips');
      container.innerHTML = '';
      Object.keys(labels).forEach((key) => {
        const chip = document.createElement('a');
        chip.className = 'chip' + (key === topic ? ' active' : '');
        chip.href = linkFor(key, section);
        chip.innerHTML = `<i class="fas ${icons[key] || 'fa-book'}"></i> ${labels[key]}`;
        container.appendChild(chip);
      });
    }

    function renderKpis(){
      const meta = topicMeta[topic] || topicMeta.forex;
      document.getElementById('kpis').innerHTML = [
        ['Focus', meta.focus],
        ['Level', meta.level],
        ['Learning Modules', String(meta.modules)],
        ['Quiz Questions', String(meta.quizzes)],
        ['Glossary Terms', String(meta.terms)]
      ].map(([label,value]) => `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div></div>`).join('');
    }

    function renderHowTo(){
      const lib = lessonLibrary[topic] || lessonLibrary.forex;
      const root = document.getElementById('contentRoot');

      root.innerHTML = `
        <div class="panel">
          <h2>Trading Framework — ${labels[topic] || 'Market'}</h2>
          <p>Each path below is designed like a full platform curriculum. Start with beginner modules, complete intermediate execution modules, then move to advanced portfolio-level decision making.</p>
          <div class="grid">
            <div class="card"><h3>1) Market Context</h3><ul><li>Identify regime (trend/range/high-volatility/event risk).</li><li>Map key levels from higher timeframes.</li><li>Define directional bias and invalidation.</li></ul></div>
            <div class="card"><h3>2) Setup & Entry</h3><ul><li>Wait for confirmation trigger, not anticipation.</li><li>Record exact entry, stop, target before execution.</li><li>Keep risk fixed to prevent emotional sizing.</li></ul></div>
            <div class="card"><h3>3) Risk & Review</h3><ul><li>Limit daily and weekly max loss.</li><li>Document execution quality after each trade.</li><li>Optimize only after statistically meaningful sample size.</li></ul></div>
          </div>
        </div>

        <div class="lesson-cards">
          ${lib.map(item => `
            <article class="lesson-card">
              <div class="lesson-head"><span class="difficulty"><i class="fas fa-lightbulb"></i> ${item.level}</span></div>
              <div class="lesson-body">
                <h3 class="lesson-title">${item.title}</h3>
                <p class="lesson-desc">${item.desc}</p>
                <div class="meta">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
              </div>
            </article>
          `).join('')}
        </div>

        <div class="panel">
          <h2>Execution Checklist</h2>
          <ul>
            <li><strong>Pre-trade:</strong> thesis, catalyst, invalidation, risk %, and news calendar checked.</li>
            <li><strong>In-trade:</strong> follow plan; avoid moving stop further away without new structure reason.</li>
            <li><strong>Post-trade:</strong> capture chart screenshot, tag setup quality, log emotional state, and assign one process improvement.</li>
          </ul>
        </div>
      `;
    }

    function renderQuizzes(){
      const bank = quizBank[topic] || quizBank.forex;
      const root = document.getElementById('contentRoot');

      const cards = bank.map((item, idx) => `
        <article class="quiz-card">
          <h3>Q${idx + 1}. ${item.q}</h3>
          <div class="options">
            ${item.options.map((opt, i) => `<div class="opt"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></div>`).join('')}
          </div>
          <div class="answer"><strong>Correct answer:</strong> ${item.answer}<br><strong>Why:</strong> ${item.explain}</div>
        </article>
      `).join('');

      root.innerHTML = `
        <div class="panel">
          <h2>${labels[topic]} — Assessment Center</h2>
          <p>This is a product-style assessment format: scenario, multiple choice, and explanation for reinforcement. Use these as weekly checks to verify strategy understanding and risk discipline.</p>
          <div class="grid">
            <div class="card"><h3>Quiz Mode</h3><ul><li>Attempt all questions without viewing answers first.</li><li>Mark confidence level (high/medium/low) per question.</li><li>Review wrong answers and update your trading playbook.</li></ul></div>
            <div class="card"><h3>Performance Target</h3><ul><li>Beginner: 70%+ accuracy</li><li>Intermediate: 80%+ accuracy + clear explanations</li><li>Advanced: 90%+ across 4 consecutive weekly tests</li></ul></div>
            <div class="card"><h3>Promotion Rule</h3><ul><li>Increase size only after both quiz consistency and live execution consistency.</li><li>No promotion if risk-rule violations occurred.</li><li>Retest weak areas before moving up.</li></ul></div>
          </div>
        </div>

        <div class="quiz-wrap">${cards}</div>

        <div class="rubric">
          <h3>Scoring Rubric</h3>
          <div class="rubric-grid">
            <div class="rubric-item"><strong style="color:var(--ok)">Excellent (90–100%)</strong><p class="sub" style="margin-top:.3rem">Strong conceptual control + disciplined process language.</p></div>
            <div class="rubric-item"><strong style="color:var(--warn)">Developing (75–89%)</strong><p class="sub" style="margin-top:.3rem">Good foundation, needs cleaner risk and execution consistency.</p></div>
            <div class="rubric-item"><strong style="color:var(--danger)">Needs Work (<75%)</strong><p class="sub" style="margin-top:.3rem">Revisit basics before adding complexity or leverage.</p></div>
          </div>
        </div>
      `;
    }

    function renderGlossary(){
      const words = glossaryBank[topic] || glossaryBank.forex;
      const root = document.getElementById('contentRoot');

      root.innerHTML = `
        <div class="panel">
          <h2>${labels[topic]} Glossary</h2>
          <p>Use this as a practical A-to-Z desk reference. Each term should connect to a real chart example in your journal. Strong vocabulary improves communication, review quality, and trade planning speed.</p>
          <div class="grid">
            <div class="card"><h3>Daily Study Method</h3><ul><li>Review 5 terms before trading.</li><li>Write one example for each term from live market action.</li><li>Re-test recall at week end.</li></ul></div>
            <div class="card"><h3>Retention Method</h3><ul><li>Use flashcards for weak terms.</li><li>Explain terms out loud like teaching a new trader.</li><li>Map each term to one risk decision you make.</li></ul></div>
            <div class="card"><h3>Application Rule</h3><ul><li>No new strategy module until core terms are understood.</li><li>Misused terms usually signal misunderstood risk.</li><li>Update glossary notes as your system evolves.</li></ul></div>
          </div>
        </div>

        <div class="glossary">
          ${words.map(([term,def]) => `<article class="term"><strong>${term}</strong><p>${def}</p></article>`).join('')}
        </div>
      `;
    }

    function run(){
      const safeTopic = labels[topic] ? topic : 'forex';
      const safeSection = sectionLabels[section] ? section : 'howto';

      document.getElementById('brandTitle').innerHTML = `<i class="fas ${icons[safeTopic] || 'fa-graduation-cap'}"></i> ${labels[safeTopic]}`;
      document.getElementById('pageTitle').textContent = `${labels[safeTopic]} — ${sectionLabels[safeSection]}`;
      document.getElementById('pageDesc').textContent = `Comprehensive ${sectionLabels[safeSection].toLowerCase()} content for ${labels[safeTopic]} with a full-platform learning structure.`;

      document.getElementById('chipHowto').href = linkFor(safeTopic, 'howto');
      document.getElementById('chipQuizzes').href = linkFor(safeTopic, 'quizzes');
      document.getElementById('chipGlossary').href = linkFor(safeTopic, 'glossary');

      document.getElementById('chipHowto').classList.toggle('active', safeSection === 'howto');
      document.getElementById('chipQuizzes').classList.toggle('active', safeSection === 'quizzes');
      document.getElementById('chipGlossary').classList.toggle('active', safeSection === 'glossary');

      renderTopicChips();
      renderKpis();

      if (safeSection === 'howto') renderHowTo();
      else if (safeSection === 'quizzes') renderQuizzes();
      else renderGlossary();
    }

    run();
  </script>
  <script src="/assets/js/live-site.js" defer></script>
</body>
</html>
