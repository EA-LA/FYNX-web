<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>FYNX - Security</title>
<link rel="stylesheet" href="assets/css/mobile-fixes.css">
<style>
*{margin:0;padding:0;box-sizing:border-box} body{font-family:'Inter',sans-serif;background:#fff;color:#000;height:100vh;overflow:hidden} body.dark-mode{background:#000;color:#fff}
.dashboard-container{display:flex;height:100vh}.nav-panel{width:120px;position:fixed;height:100vh;background:#fafafa;border-right:1px solid #e5e5e5} body.dark-mode .nav-panel{background:#000;border-right:1px solid rgba(255,255,255,.08)}
.main-content{margin-left:120px;flex:1;display:flex;flex-direction:column}.top-bar{height:64px;padding:0 32px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between} body.dark-mode .top-bar{border-bottom-color:rgba(255,255,255,.08)}
.content-area{padding:30px;overflow:auto;display:grid;gap:12px}.card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:14px} body.dark-mode .card{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.field{display:grid;gap:6px;margin-bottom:8px}.field input{height:40px;border:1px solid #ddd;border-radius:10px;padding:0 12px;background:#fff} body.dark-mode .field input{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.08)} .row:last-child{border-bottom:none}
.switch{width:48px;height:28px;border:1px solid #ddd;border-radius:999px;position:relative;cursor:pointer;background:#fff}.knob{width:22px;height:22px;border-radius:50%;background:#111;position:absolute;left:2px;top:2px;transition:.2s}.switch.on .knob{left:22px}
body.dark-mode .switch{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2)} body.dark-mode .knob{background:#fff}
.btn{height:38px;padding:0 12px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:800;cursor:pointer}.btn.primary{background:#000;color:#fff;border-color:#000}.btn.danger{background:#000;color:#fff;border-color:#000}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid #ddd;background:#fff;display:grid;place-items:center;cursor:pointer}.icon-btn svg{width:18px;height:18px;stroke:#000;stroke-width:1.5;fill:none} body.dark-mode .icon-btn{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)} body.dark-mode .icon-btn svg{stroke:#fff}
</style></head>
<body data-protected-page="true"><div class="dashboard-container"><nav class="nav-panel"></nav><main class="main-content">
<div class="top-bar"><h1>Security</h1><div style="display:flex;gap:12px"><button class="icon-btn" id="themeBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg></button><button class="icon-btn" title="Notifications"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button></div></div>
<div class="content-area">
<div><h2 style="font-size:28px">Security</h2><p style="font-size:13px;color:#888;margin-top:4px">Account defense controls, session visibility, and verification status.</p></div>
<div class="card"><h3 style="font-size:14px;margin-bottom:8px">Password</h3><form id="passwordForm"><div class="field"><label style="font-size:12px;color:#777">Current password</label><input type="password" id="currentPassword" required></div><div class="field"><label style="font-size:12px;color:#777">New password</label><input type="password" id="newPassword" required minlength="8"></div><div style="display:flex;gap:8px;align-items:center"><button class="btn primary" type="submit">Change password</button><span id="passwordStatus" style="font-size:12px;color:#777"></span></div></form></div>
<div class="card"><h3 style="font-size:14px;margin-bottom:8px">Verification & Controls</h3>
<div class="row"><span>Email verification</span><div style="display:flex;gap:8px;align-items:center"><span id="verifyStatus" style="font-size:12px">Checking...</span><button class="btn" id="resendBtn" type="button">Resend email</button></div></div>
<div class="row"><span>Login alerts</span><button class="switch" id="loginAlertsSwitch" type="button"><span class="knob"></span></button></div>
<div class="row"><span>Two-factor authentication</span><span style="font-size:12px;color:#777">Coming later (structure ready)</span></div>
</div>
<div class="card"><h3 style="font-size:14px;margin-bottom:8px">Active Sessions</h3><div id="sessionList" style="font-size:12px;color:#777">Loading sessions...</div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="btn" id="logoutCurrentBtn" type="button">Log out current session</button><button class="btn danger" id="logoutAllBtn" type="button">Log out all devices</button></div></div>
</div></main></div>
<script type="module" src="assets/js/session-bootstrap.js"></script>
<script>
  (function(){
    const nav=document.querySelector('.nav-panel');
    if(!nav) return;
    const items=[['home','home.html','<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>'],['journal','journal.html','<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>'],['calculator','calculator.html','<rect x="4" y="2" width="16" height="20" rx="2"></rect>'],['news','news.html','<path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>'],['calendar','calendar.html','<rect x="3" y="4" width="18" height="18" rx="2"></rect>'],['profile','profile.html','<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>']];
    nav.innerHTML=`<div style="padding:32px 0;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:800">FYNX</div><div style="padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px">${items.map(([k,href,svg])=>`<a href="${href}" style="width:80px;padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;color:#666;border-radius:8px"><svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5">${svg}</svg><span style="font-size:11px;font-weight:600">${k[0].toUpperCase()+k.slice(1)}</span></a>`).join('')}</div>`;
  })();
</script><script type="module">
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { auth, bootstrapAccount, updatePasswordWithReauth, resendVerificationEmail, saveSecuritySettings, getSessionMetadata, revokeAllSessions, logoutCurrentSession } from './assets/js/account-system.js';
import { mountNotificationBell } from './assets/js/account-ui.js';
let sessionId = null;
function applyTheme(){const t=localStorage.getItem('fynx_theme');document.body.classList.toggle('dark-mode',t==='dark');} applyTheme();
document.getElementById('themeBtn').onclick=()=>{const d=!document.body.classList.contains('dark-mode');document.body.classList.toggle('dark-mode',d);localStorage.setItem('fynx_theme',d?'dark':'light');};

passwordForm.addEventListener('submit', async(e)=>{e.preventDefault(); passwordStatus.textContent='Updating...'; try{ await updatePasswordWithReauth(currentPassword.value,newPassword.value); passwordStatus.textContent='Password updated'; passwordForm.reset(); }catch(err){passwordStatus.textContent=err.message || 'Password update failed';}});
resendBtn.onclick = async()=>{ try { await resendVerificationEmail(); verifyStatus.textContent='Verification email sent'; } catch(err){ verifyStatus.textContent='Could not send email'; } };
loginAlertsSwitch.onclick = async()=>{ loginAlertsSwitch.classList.toggle('on'); if(auth.currentUser){ await saveSecuritySettings(auth.currentUser.uid, { loginAlerts: loginAlertsSwitch.classList.contains('on') }); } };
logoutCurrentBtn.onclick = async()=>{ await logoutCurrentSession('auth/login.html'); window.location.href='auth/login.html'; };
logoutAllBtn.onclick = async()=>{ if(!auth.currentUser) return; await revokeAllSessions(auth.currentUser.uid, sessionId); await logoutCurrentSession('auth/login.html?reason=all-sessions-revoked'); window.location.href='auth/login.html?reason=all-sessions-revoked'; };

onAuthStateChanged(auth, async(user)=>{ if(!user) return; const seeded = await bootstrapAccount(user); verifyStatus.textContent = user.emailVerified ? 'Verified' : 'Not verified'; loginAlertsSwitch.classList.toggle('on', seeded.security?.loginAlerts !== false); const sessions = await getSessionMetadata(user.uid); const list = sessions.map((s)=>`<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,.08)"><strong>${s.platform||'Device'}</strong> • ${s.timezone||'UTC'} • ${s.status||'active'}</div>`).join('') || 'No session metadata yet'; sessionList.innerHTML=list; sessionId = sessions[0]?.sessionId || null;});

mountNotificationBell();
</script><script src="/assets/js/live-site.js" defer></script>
</body></html>
