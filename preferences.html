<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FYNX - Preferences</title>
<link rel="stylesheet" href="assets/css/mobile-fixes.css">
<style>
*{margin:0;padding:0;box-sizing:border-box} body{font-family:'Inter',sans-serif;background:#fff;color:#000;height:100vh;overflow:hidden} body.dark-mode{background:#000;color:#fff}
.dashboard-container{display:flex;height:100vh}.nav-panel{width:120px;position:fixed;left:0;top:0;height:100vh;background:#fafafa;border-right:1px solid #e5e5e5} body.dark-mode .nav-panel{background:#000;border-right:1px solid rgba(255,255,255,.08)}
.main-content{margin-left:120px;flex:1;display:flex;flex-direction:column}.top-bar{height:64px;padding:0 32px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between} body.dark-mode .top-bar{border-bottom-color:rgba(255,255,255,.08)}
.content-area{padding:32px;overflow:auto;display:grid;gap:12px}.card{background:#fafafa;border:1px solid #e5e5e5;border-radius:12px;padding:16px} body.dark-mode .card{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field{display:grid;gap:6px}.field label{font-size:12px;color:#777;font-weight:700}
.field input,.field select{height:40px;border:1px solid #ddd;border-radius:10px;padding:0 12px;background:#fff} body.dark-mode .field input,body.dark-mode .field select{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#fff}
.switch{width:48px;height:28px;border:1px solid #ddd;border-radius:999px;position:relative;cursor:pointer;background:#fff}.knob{width:22px;height:22px;border-radius:50%;background:#111;position:absolute;left:2px;top:2px;transition:.2s}.switch.on .knob{left:22px}
body.dark-mode .switch{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2)} body.dark-mode .knob{background:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)} .row:last-child{border-bottom:none}
.btn{height:40px;padding:0 14px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:13px;font-weight:800;cursor:pointer}.btn.primary{background:#000;color:#fff;border-color:#000}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid #ddd;background:#fff;display:grid;place-items:center;cursor:pointer}.icon-btn svg{width:18px;height:18px;stroke:#000;stroke-width:1.5;fill:none}
body.dark-mode .icon-btn{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)} body.dark-mode .icon-btn svg{stroke:#fff}
@media(max-width:900px){.grid{grid-template-columns:1fr}.content-area{padding:20px}}
</style></head>
<body data-protected-page="true"><div class="dashboard-container"><nav class="nav-panel"></nav><main class="main-content">
<div class="top-bar"><h1 class="page-title">Preferences</h1><div style="display:flex;gap:12px"><button class="icon-btn" id="themeBtn" title="Toggle theme"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg></button><button class="icon-btn" title="Notifications"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button></div></div>
<div class="content-area">
<div><h2 style="font-size:28px">Preferences</h2><p style="color:#888;font-size:13px;margin-top:4px">Platform behavior defaults for tools, alerts, and market workflow.</p></div>
<form class="card" id="prefForm"><div class="grid">
<div class="field"><label>Theme mode</label><select id="themeMode"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></div>
<div class="field"><label>Timezone</label><input id="timezone"></div>
<div class="field"><label>Currency</label><select id="currency"><option>USD</option><option>EUR</option><option>GBP</option><option>JPY</option></select></div>
<div class="field"><label>Date/time format</label><select id="dateTimeFormat"><option value="MMM d, yyyy HH:mm">MMM d, yyyy HH:mm</option><option value="MM/dd/yyyy hh:mm a">MM/dd/yyyy hh:mm a</option><option value="dd/MM/yyyy HH:mm">dd/MM/yyyy HH:mm</option></select></div>
<div class="field"><label>Default risk %</label><input type="number" min="0.1" max="10" step="0.1" id="defaultRiskPercent"></div>
<div class="field"><label>Default lot size</label><input type="number" min="0.01" max="100" step="0.01" id="defaultLotSize"></div>
<div class="field"><label>Default RR</label><input type="number" min="0.1" max="20" step="0.1" id="defaultRR"></div>
<div class="field"><label>Preferred market focus</label><select id="preferredMarketFocus"><option value="forex">Forex</option><option value="crypto">Crypto</option><option value="stocks">Stocks</option><option value="indices">Indices</option><option value="commodities">Commodities</option></select></div>
</div>
<div class="card" style="margin-top:12px">
<div class="row"><span>Email alerts</span><button class="switch" data-switch="emailAlerts" type="button"><span class="knob"></span></button></div>
<div class="row"><span>In-app alerts</span><button class="switch" data-switch="inAppAlerts" type="button"><span class="knob"></span></button></div>
<div class="row"><span>Sound alerts</span><button class="switch" data-switch="soundAlerts" type="button"><span class="knob"></span></button></div>
<div class="row"><span>Performance mode (lighter updates)</span><button class="switch" data-switch="performanceMode" type="button"><span class="knob"></span></button></div>
</div>
<div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center"><small id="saveStatus" style="color:#777">Ready</small><button class="btn primary" type="submit">Save preferences</button></div>
</form></div></main></div>
<script type="module" src="assets/js/session-bootstrap.js"></script>
<script>
  (function(){
    const nav=document.querySelector('.nav-panel');
    if(!nav) return;
    const items=[['home','home.html','<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>'],['journal','journal.html','<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>'],['calculator','calculator.html','<rect x="4" y="2" width="16" height="20" rx="2"></rect>'],['news','news.html','<path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path>'],['calendar','calendar.html','<rect x="3" y="4" width="18" height="18" rx="2"></rect>'],['profile','profile.html','<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>']];
    nav.innerHTML=`<div style="padding:32px 0;text-align:center;border-bottom:1px solid #e5e5e5;font-weight:800">FYNX</div><div style="padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px">${items.map(([k,href,svg])=>`<a href="${href}" style="width:80px;padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;color:#666;border-radius:8px"><svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5">${svg}</svg><span style="font-size:11px;font-weight:600">${k[0].toUpperCase()+k.slice(1)}</span></a>`).join('')}</div>`;
  })();
</script><script type="module">
import { auth, bootstrapAccount, saveUserPreferences } from './assets/js/account-system.js';
import { mountNotificationBell } from './assets/js/account-ui.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
const bools = { emailAlerts:true, inAppAlerts:true, soundAlerts:false, performanceMode:false };
function applyTheme(){const t=localStorage.getItem('fynx_theme');document.body.classList.toggle('dark-mode',t==='dark');} applyTheme();
document.getElementById('themeBtn').onclick=()=>{const d=!document.body.classList.contains('dark-mode');document.body.classList.toggle('dark-mode',d);localStorage.setItem('fynx_theme',d?'dark':'light');};
document.querySelectorAll('.switch').forEach((s)=>s.onclick=()=>{const k=s.dataset.switch;bools[k]=!bools[k];s.classList.toggle('on',bools[k]);});
function fill(pref){['themeMode','timezone','currency','dateTimeFormat','defaultRiskPercent','defaultLotSize','defaultRR','preferredMarketFocus'].forEach((id)=>document.getElementById(id).value=pref[id] ?? '');Object.keys(bools).forEach((k)=>{bools[k]=Boolean(pref[k]);document.querySelector(`.switch[data-switch="${k}"]`).classList.toggle('on',bools[k]);});}
onAuthStateChanged(auth, async (user)=>{if(!user) return; const seeded=await bootstrapAccount(user); fill(seeded.preferences);});
document.getElementById('prefForm').addEventListener('submit', async(e)=>{e.preventDefault();const user=auth.currentUser;if(!user)return;const payload={themeMode:themeMode.value,timezone:timezone.value.trim(),currency:currency.value,dateTimeFormat:dateTimeFormat.value,defaultRiskPercent:Number(defaultRiskPercent.value||1),defaultLotSize:Number(defaultLotSize.value||0.1),defaultRR:Number(defaultRR.value||2),preferredMarketFocus:preferredMarketFocus.value,...bools};saveStatus.textContent='Saving...';await saveUserPreferences(user.uid,payload);localStorage.setItem('fynx_preferences',JSON.stringify(payload));if(payload.themeMode==='dark'||payload.themeMode==='light'){localStorage.setItem('fynx_theme',payload.themeMode);applyTheme();}saveStatus.textContent='Saved';});
mountNotificationBell();
</script>
<script src="/assets/js/live-site.js" defer></script>
</body></html>
