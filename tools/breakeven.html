<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FYNX Tools — Break Even Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --bg:#f3f3f5;
      --text:#0b0b0c;
      --panel-bg:rgba(255,255,255,.75);
      --panel-border:rgba(0,0,0,.10);
      --muted:rgba(0,0,0,.62);
      --grid-line:rgba(0,0,0,0.035);
      --orb:rgba(0,0,0,.14);
      --good:#118a4e;
      --warn:#d48b00;
      --bad:#c8342f;
    }

    body.dark-mode{
      --bg:#000;
      --text:#fff;
      --panel-bg:rgba(0,0,0,.55);
      --panel-border:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.65);
      --grid-line:rgba(255,255,255,0.03);
      --orb:#fff;
      --good:#35d07f;
      --warn:#ffb347;
      --bad:#ff6b61;
    }

    body{
      font-family:'Inter','Segoe UI',system-ui,sans-serif;
      color:var(--text);
      background:var(--bg);
      min-height:100vh;
    }

    .animated-bg{position:fixed;inset:0;z-index:-1}
    .grid-overlay{
      position:absolute;inset:0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size:50px 50px;
    }

    header{
      padding:1rem 0;
      border-bottom:1px solid var(--panel-border);
    }

    .nav{
      max-width:1200px;margin:0 auto;
      display:flex;justify-content:space-between;
      padding:0 1.25rem;
    }

    main{max-width:1200px;margin:0 auto;padding:3rem 1.25rem}

    .hero{
      border:1px solid var(--panel-border);
      background:var(--panel-bg);
      border-radius:20px;
      padding:2rem;
    }

    h1{font-size:2.5rem;margin-bottom:.5rem}
    p{color:var(--muted)}

    .panel-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:1rem;
      margin-top:1.5rem;
    }

    .panel{
      border:1px solid var(--panel-border);
      background:var(--panel-bg);
      border-radius:16px;
      padding:1rem;
    }

    input,select{
      width:100%;
      padding:.8rem;
      margin-top:.4rem;
      border-radius:10px;
      border:1px solid var(--panel-border);
      background:transparent;
      color:var(--text);
    }

    button{
      margin-top:1rem;
      padding:.8rem;
      border:none;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
      width:100%;
    }

    .primary{background:var(--text);color:var(--bg)}
    .secondary{background:transparent;border:1px solid var(--panel-border)}

    .metric{
      margin-top:1rem;
      padding:.8rem;
      border-radius:10px;
      border:1px solid var(--panel-border);
    }

    .good{color:var(--good)}
    .warn{color:var(--warn)}
    .bad{color:var(--bad)}

    @media(max-width:800px){
      .panel-grid{grid-template-columns:1fr}
    }
  </style>
  <link rel="stylesheet" href="../assets/css/mobile-fixes.css">
</head>
<body>

<header>
  <div class="nav">
    <div><i class="fas fa-chart-line"></i> FYNX Tools</div>
  </div>
</header>

<main>
  <section class="hero">
    <h1>Break Even Calculator</h1>
    <p>Calculate the exact price where your trade becomes profitable after fees, spread, and position size.</p>

    <div class="panel-grid">

      <!-- INPUT -->
      <div class="panel">
        <h3>Inputs</h3>

        <label>Position Type</label>
        <select id="type">
          <option value="buy">Buy (Long)</option>
          <option value="sell">Sell (Short)</option>
        </select>

        <label>Entry Price</label>
        <input id="entry" type="number" value="1.1000">

        <label>Lot Size</label>
        <input id="lot" type="number" value="1">

        <label>Spread (pips)</label>
        <input id="spread" type="number" value="1">

        <label>Commission ($)</label>
        <input id="commission" type="number" value="7">

        <button class="primary" onclick="calc()">Calculate</button>
        <button class="secondary" onclick="resetCalc()">Reset</button>
      </div>

      <!-- RESULT -->
      <div class="panel">
        <h3>Results</h3>

        <div class="metric">
          Break Even Price: <strong id="be">—</strong>
        </div>

        <div class="metric">
          Total Cost: <strong id="cost">—</strong>
        </div>

        <div class="metric">
          Pips Needed: <strong id="pips">—</strong>
        </div>

        <div class="metric" id="statusBox">
          Status: —
        </div>

      </div>

    </div>
  </section>
</main>

<script>
function calc(){
  let type = document.getElementById("type").value;
  let entry = parseFloat(document.getElementById("entry").value);
  let lot = parseFloat(document.getElementById("lot").value);
  let spread = parseFloat(document.getElementById("spread").value);
  let commission = parseFloat(document.getElementById("commission").value);

  if(!entry || !lot){
    alert("Enter valid values");
    return;
  }

  let pipValue = 10 * lot; // standard forex
  let spreadCost = spread * pipValue;
  let totalCost = spreadCost + commission;

  let pipsNeeded = totalCost / pipValue;

  let bePrice;

  if(type === "buy"){
    bePrice = entry + (pipsNeeded * 0.0001);
  } else {
    bePrice = entry - (pipsNeeded * 0.0001);
  }

  document.getElementById("be").innerText = bePrice.toFixed(5);
  document.getElementById("cost").innerText = "$" + totalCost.toFixed(2);
  document.getElementById("pips").innerText = pipsNeeded.toFixed(2) + " pips";

  let status = document.getElementById("statusBox");

  if(pipsNeeded < 2){
    status.innerHTML = "Status: <span class='good'>Efficient Trade</span>";
  } else if(pipsNeeded < 5){
    status.innerHTML = "Status: <span class='warn'>Moderate Cost</span>";
  } else {
    status.innerHTML = "Status: <span class='bad'>Expensive Trade</span>";
  }
}

function resetCalc(){
  document.getElementById("entry").value = "1.1000";
  document.getElementById("lot").value = "1";
  document.getElementById("spread").value = "1";
  document.getElementById("commission").value = "7";

  document.getElementById("be").innerText = "—";
  document.getElementById("cost").innerText = "—";
  document.getElementById("pips").innerText = "—";
  document.getElementById("statusBox").innerText = "Status: —";
}
</script>

</body>
</html>
